  }

  return card;
}

function escHtml(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function renderAll() {
  renderSidebar();
  renderMain();
}

// ─────────────────────────────────────────────────────────────────────────────
// FILTERS
// ─────────────────────────────────────────────────────────────────────────────
function applyFilters() {
  currentFilter.group         = document.getElementById('filterGroup').value;
  currentFilter.level          = document.getElementById('filterLevel').value;
  currentFilter.search         = document.getElementById('filterSearch').value.trim();
  currentFilter.starredOnly    = document.getElementById('showStarred').checked;
  currentFilter.highlightedOnly = document.getElementById('showHighlighted').checked;
  activeGroupId = currentFilter.group ? parseInt(currentFilter.group) : null;
  renderAll();
  if (activeGroupId) {
    setTimeout(() => {
      const el = document.getElementById(`group-${activeGroupId}`);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 50);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// ADD QUESTION MODAL
// ─────────────────────────────────────────────────────────────────────────────
function openAddModal(groupId) {
  const modal = document.getElementById('addModal');
  modal.classList.add('open');
  const sel = document.getElementById('addGroupSelect');
  buildGroupSelect(sel);
  if (groupId) sel.value = groupId;
  document.getElementById('addQuestion').value = '';
  document.getElementById('addKeyPoints').value = '';
  document.getElementById('addRedFlags').value = '';
  document.getElementById('addFigmaLink').value = '';
  document.getElementById('addQuestion').focus();
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('open');
}

function saveQuestion() {
  const gid = parseInt(document.getElementById('addGroupSelect').value);
  const q   = document.getElementById('addQuestion').value.trim();
  const k   = document.getElementById('addKeyPoints').value.trim();
  const r   = document.getElementById('addRedFlags').value.trim();
  const f   = document.getElementById('addFigmaLink').value.trim();
  if (!q) { document.getElementById('addQuestion').focus(); return; }
  if (!customs[gid]) customs[gid] = [];
  customs[gid].push({ q, k, r, f });
  save();
  closeAddModal();
  renderAll();
}

document.getElementById('addModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeAddModal();
});

// ─────────────────────────────────────────────────────────────────────────────
// EXPORT
// ─────────────────────────────────────────────────────────────────────────────
function openExport() {
  const lines = [];
  GROUPS.forEach(g => {
    const allQ = g.questions.map((q, i) => ({ ...q, _id: qid(g.id, i) }));
    const cq   = (customs[g.id] || []).map((q, i) => ({ ...q, _id: qid(g.id, 1000 + i) }));
    const starred = [...allQ, ...cq].filter(q => stars.has(q._id));
    if (starred.length === 0) return;
    lines.push(`\n== Group ${g.id}. ${g.name} (${levelLabel(g.level)}) ==\n`);
    starred.forEach((q, i) => {
      lines.push(`Q${i+1}. ${q.q}`);
      if (q.k) lines.push(`   Key Points. ${q.k}`);
      if (q.r) lines.push(`   Red Flags. ${q.r}`);
      lines.push('');
    });
  });
  if (lines.length === 0) {
    document.getElementById('exportText').value = 'No starred questions yet. Click the star icon on a question card to star it.';
  } else {
    document.getElementById('exportText').value = lines.join('\n').trim();
  }
  document.getElementById('exportPanel').classList.add('open');
}

function closeExport() {
  document.getElementById('exportPanel').classList.remove('open');
}

function copyExport() {
  const ta = document.getElementById('exportText');
  navigator.clipboard.writeText(ta.value).then(() => {
    const btn = document.querySelector('.export-actions .btn-accent');
    btn.textContent = 'Copied.';
    setTimeout(() => btn.textContent = 'Copy to clipboard', 2000);
  });
}

document.getElementById('exportPanel').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeExport();
});

// ─────────────────────────────────────────────────────────────────────────────
// CLEAR SESSION
// ─────────────────────────────────────────────────────────────────────────────
function clearSession() {
  if (!confirm('Clear all stars, highlights, and custom questions? This cannot be undone.')) return;
  stars.clear();
  highlights.clear();
  Object.keys(customs).forEach(k => delete customs[k]);
  save();
  renderAll();
}

async function syncGenerator() {
  const btn = document.getElementById('sync-btn');
  const orig = btn.textContent;
  btn.textContent = 'Syncing...';
  btn.disabled = true;
  try {
    const r = await fetch('/api/sync-generator', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
    const d = await r.json();
    if (d.ok) {
      btn.textContent = '✓ Synced!';
      setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 2000);
    } else {
      alert('Sync failed: ' + d.error);
      btn.textContent = orig;
      btn.disabled = false;
    }
  } catch (e) {
    alert('Server not available');
    btn.textContent = orig;
    btn.disabled = false;
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
(async function init() {
  // 1. Populate filter + render immediately from hardcoded GROUPS + localStorage
  const groupSel = document.getElementById('filterGroup');
  GROUPS.forEach(g => {
    const o = document.createElement('option');
    o.value = g.id;
    o.textContent = `Group ${g.id}. ${g.name}`;
    groupSel.appendChild(o);
  });
  renderAll();

  // 2. Try connecting to server (non-blocking, 3s timeout)
  try {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 3000);
    const data = await fetch('/api/data', { signal: ctrl.signal }).then(r => {
      if (!r.ok) throw new Error('Server error');
      return r.json();
    });
    clearTimeout(timer);
    serverAvailable = true;

    // Load authoritative data from server
    if (data.groups && data.groups.length) {
      GROUPS = data.groups;
    }
    stars      = new Set(data.stars      || []);
    highlights = new Set(data.highlights || []);
    customs    = {};
    (data.groups || []).forEach(g => { if (g.customs && g.customs.length) customs[g.id] = g.customs; });

    // Refresh group filter with server data
    while (groupSel.options.length > 1) groupSel.remove(1);
    GROUPS.forEach(g => {
      const o = document.createElement('option');
      o.value = g.id;
      o.textContent = `Group ${g.id}. ${g.name}`;
      groupSel.appendChild(o);
    });
    document.getElementById('server-badge').style.display = 'inline-flex';
    renderAll();
  } catch (e) {
    // Offline mode: use hardcoded GROUPS + localStorage
    document.getElementById('server-badge').style.display = 'none';
  }
})();
</script>
</body>
</html>
